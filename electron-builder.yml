appId: com.elinemobile.pos
productName: Eline Mobile
copyright: Copyright © 2026 Eline Mobile
# Utilise l'Electron déjà installé dans node_modules (build rapide, sans re-téléchargement).
electronDist: node_modules/electron/dist
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintrc,.prettierrc,tsconfig*.json}'
extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Eline Mobile
  installerLanguages:
    - fr_FR
  language: '1036'
